<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="__RESOURCES_BASE__/css/github-dark.min.css">
    <link rel="stylesheet" href="__RESOURCES_BASE__/css/katex.min.css">
    <link rel="stylesheet" href="__RESOURCES_BASE__/style.css">
    <script src="__RESOURCES_BASE__/js/marked.min.js"></script>
    <script src="__RESOURCES_BASE__/js/highlight.min.js"></script>
    <script src="__RESOURCES_BASE__/js/katex.min.js"></script>
    <script src="__RESOURCES_BASE__/js/auto-render.min.js"></script>
    <script src="__RESOURCES_BASE__/js/mermaid.min.js" defer></script>
</head>
<body>
    <article id="content"></article>
    <script>
        // Configure marked with GFM and highlight.js
        marked.setOptions({
            gfm: true,
            breaks: false
        });

        // Use marked-highlight extension pattern if available, else fallback
        if (typeof markedHighlight !== 'undefined') {
            marked.use(markedHighlight.markedHighlight({
                langPrefix: 'hljs language-',
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
                }
            }));
        }

        // Custom renderer for mermaid blocks
        const renderer = new marked.Renderer();
        const originalCode = renderer.code;
        renderer.code = function(obj) {
            // marked v5+ passes an object {text, lang, escaped}
            var code, lang;
            if (typeof obj === 'object' && obj !== null) {
                code = obj.text;
                lang = obj.lang;
            } else {
                code = obj;
                lang = arguments[1];
            }

            if (lang === 'mermaid') {
                return '<div class="mermaid">' + code + '</div>';
            }
            // Fallback: manually build highlighted code block
            var highlighted;
            if (lang && typeof hljs !== 'undefined' && hljs.getLanguage(lang)) {
                highlighted = hljs.highlight(code, { language: lang }).value;
            } else if (typeof hljs !== 'undefined') {
                highlighted = hljs.highlightAuto(code).value;
            } else {
                highlighted = code;
            }
            return '<pre><code class="hljs language-' + (lang || '') + '">' + highlighted + '</code></pre>';
        };

        function render(markdown) {
            var el = document.getElementById('content');
            el.innerHTML = marked.parse(markdown, { renderer: renderer });

            // KaTeX: render math expressions
            if (typeof renderMathInElement !== 'undefined') {
                renderMathInElement(el, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\[', right: '\\]', display: true},
                        {left: '\\(', right: '\\)', display: false}
                    ],
                    throwOnError: false
                });
            }

            // Mermaid: render diagrams
            if (typeof mermaid !== 'undefined') {
                try {
                    mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
                } catch(e) {
                    console.warn('Mermaid render error:', e);
                }
            }

            // Fade in
            el.style.opacity = '1';
        }

        // Initialize mermaid
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof mermaid !== 'undefined') {
                mermaid.initialize({
                    startOnLoad: false,
                    theme: 'dark',
                    securityLevel: 'loose'
                });
            }

            // Render initial content
            var content = __MARKDOWN_CONTENT__;
            if (content) render(content);
        });
    </script>
</body>
</html>
